name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          cd ctd-loadingscreen
          zip -r ../ctd-loadingscreen-${{ github.ref_name }}.zip . \
            --exclude "*.gitkeep"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: ctd-loadingscreen-${{ github.ref_name }}.zip
          generate_release_notes: true
